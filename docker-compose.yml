services:
  compact-playground:
    build: .
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - PORT=8080
      - DEFAULT_COMPILER_VERSION=${DEFAULT_COMPILER_VERSION:-latest}
      - CACHE_KEY_SALT=${CACHE_KEY_SALT:?CACHE_KEY_SALT must be set}
      - CACHE_ENABLED=${CACHE_ENABLED:-true}
      - CACHE_DIR=/data/cache
      - CACHE_MAX_DISK_MB=${CACHE_MAX_DISK_MB:-800}
      - CACHE_MAX_ENTRIES=${CACHE_MAX_ENTRIES:-50000}
      - CACHE_TTL=${CACHE_TTL:-2592000000}
      - TEMP_DIR=/tmp/compact-playground
      - MAX_CODE_SIZE=${MAX_CODE_SIZE:-102400}
      - MAX_JSON_BODY_SIZE=${MAX_JSON_BODY_SIZE:-524288}
      - MAX_CONCURRENT_EXECUTIONS=${MAX_CONCURRENT_EXECUTIONS:-3}
      - FORMAT_TIMEOUT=${FORMAT_TIMEOUT:-10000}
      - RATE_LIMIT=${RATE_LIMIT:-20}
      - RATE_WINDOW=${RATE_WINDOW:-60000}
      - ARCHIVE_RATE_LIMIT=${ARCHIVE_RATE_LIMIT:-10}
      - ARCHIVE_RATE_WINDOW=${ARCHIVE_RATE_WINDOW:-60000}
      - TRUST_PROXY=${TRUST_PROXY:-true}
      - TRUST_CLOUDFLARE=${TRUST_CLOUDFLARE:-false}
    volumes:
      - cache_data:/data/cache
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    restart: unless-stopped

volumes:
  cache_data:
