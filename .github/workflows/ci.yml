name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  COMPACT_CLI_VERSION: "0.5.0"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint

  format:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run format

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - name: Install Compact CLI
        run: |
          curl -fsSL "https://github.com/midnightntwrk/compact/releases/download/compact-v${COMPACT_CLI_VERSION}/compact-x86_64-unknown-linux-musl.tar.xz" -o /tmp/compact.tar.xz
          mkdir -p /tmp/compact-extract "$HOME/.compact/bin"
          tar -xJf /tmp/compact.tar.xz -C /tmp/compact-extract
          find /tmp/compact-extract -name "compact" -type f -exec cp {} "$HOME/.compact/bin/compact" \;
          chmod +x "$HOME/.compact/bin/compact"
          echo "$HOME/.compact/bin" >> "$GITHUB_PATH"
          rm -rf /tmp/compact.tar.xz /tmp/compact-extract
      - name: Install compiler versions
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          compact --version
          compact update 0.30.0
          compact update 0.29.0
          compact update 0.28.0
      - run: npm ci
      - run: npm run test:run

  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=moderate
